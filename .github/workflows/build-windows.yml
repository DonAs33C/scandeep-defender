name: Build ScanDeep Defender

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install npm deps
        run: npm install

      - name: Update Cargo dependencies
        working-directory: src-tauri
        run: cargo update
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ScanDeep Defender ${{ github.ref_name }}"
          releaseBody: "Automatic Release Windows"
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: ScanDeep-Defender-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: ScanDeep-Defender-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload portable (.zip)
        uses: actions/upload-artifact@v4
        with:
          name: ScanDeep-Defender-portable
          path: src-tauri/target/release/bundle/nsis/*.zip
          if-no-files-found: warn
