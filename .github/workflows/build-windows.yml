name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        run: npm install

      - name: Download default Tauri icons
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/icons
          $client = New-Object System.Net.WebClient
          $base = "https://raw.githubusercontent.com/tauri-apps/tauri/dev/examples/api/src-tauri/icons"
          $client.DownloadFile("$base/icon.ico",      "src-tauri/icons/icon.ico")
          $client.DownloadFile("$base/32x32.png",     "src-tauri/icons/32x32.png")
          $client.DownloadFile("$base/128x128.png",   "src-tauri/icons/128x128.png")
          $client.DownloadFile("$base/128x128@2x.png","src-tauri/icons/128x128@2x.png")
          $client.DownloadFile("$base/icon.png",      "src-tauri/icons/icon.png")

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Malware Scanner ${{ github.ref_name }}"
          releaseBody: "Release automatica Windows."
          releaseDraft: false
          prerelease: false
