name: Build Windows release

on:
  push:
    tags:
      - 'v*'   # push di tag v1.0.0, v1.0.1, ecc.

jobs:
  build:
    name: Build Tauri app (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - name: Install npm deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # Install Rust
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Install Tauri CLI
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      # Build Tauri app (produces installer + portable exe)
      - name: Build Tauri
        run: npm run tauri build

      # Esporta artefatti Windows (installer + portable exe + zip)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*        # o NSIS
            src-tauri/target/release/bundle/nsis/*       # a seconda della tua config
            src-tauri/target/release/bundle/portable/*   # se presente

      # Crea release GitHub con i file allegati
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          files: src-tauri/target/release/bundle/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
