name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        run: npm install

      # Scarica le icone default di Tauri nel runner
      - name: Download default Tauri icons
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/icons
          Invoke-WebRequest -Uri "https://github.com/tauri-apps/tauri/raw/dev/examples/api/src-tauri/icons/icon.ico" -OutFile "src-tauri/icons/icon.ico"
          Invoke-WebRequest -Uri "https://github.com/tauri-apps/tauri/raw/dev/examples/api/src-tauri/icons/32x32.png" -OutFile "src-tauri/icons/32x32.png"
          Invoke-WebRequest -Uri "https://github.com/tauri-apps/tauri/raw/dev/examples/api/src-tauri/icons/128x128.png" -OutFile "src-tauri/icons/128x128.png"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Malware Scanner ${{ github.ref_name }}"
          releaseBody: "Release automatica Windows."
          releaseDraft: false
          prerelease: false
